version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vendure-postgres
    environment:
      POSTGRES_USER: vendure
      POSTGRES_PASSWORD: vendure
      POSTGRES_DB: vendure
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendure"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vendure-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vendure:
    build: ./vendure
    container_name: vendure-app
    environment:
      APP_ENV: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vendure
      DB_USERNAME: vendure
      DB_PASSWORD: vendure
      DB_SCHEMA: public
      SUPERADMIN_USERNAME: superadmin
      SUPERADMIN_PASSWORD: superadmin
      COOKIE_SECRET: troque-esse-segredo
      MIDDLEWARE_URL: http://middleware:8080
      MIDDLEWARE_JWT: changeme-dev-token
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  middleware:
    build: ./middleware
    container_name: middleware-app
    environment:
      HTTP_PORT: 8080
      PAYMENT_SERVICE_URL: http://payment-service:8081
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: changeme-dev-token
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "8081:8081"

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
